<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>studentRegistration Form</title>
    <link rel="stylesheet" href="bootstrap-5.0.2-dist/bootstrap-5.0.2-dist/css/bootstrap.min.css">
    <script src="./bootstrap-5.0.2-dist/bootstrap-5.0.2-dist/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="studentRegistration.css">
    <script src="studentRegistration.js"></script>
</head>
<body>
    <div class="container">
        <h2>Student Registration</h2>

        <form id="regForm">
            <label>Full Name:</label>
            <input type="text" id="name" placeholder="Enter full name">

            <label>Email:</label>
            <input type="email" id="email" placeholder="Enter email">

            <label>Phone:</label>
            <input type="text" id="phone" placeholder="Enter phone number">

            <label>Gender:</label>
            <select id="gender">
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <label>Date of Birth:</label>
            <input type="date" id="dob">

            <label>Course:</label>
            <select id="course">
                <option value="">Select Course</option>
                <option>BCA</option>
                <option>MCA</option>
                <option>B.Tech</option>
                <option>M.Tech</option>
                <option>BBA</option>
            </select>

            <button type="button" onclick="registerStudent()">Register</button>

            <p id="message" class="success">Registration successful!</p>
        </form>
    </div>
</body>
</html>
